name: Release

# Publishes @toon-protocol/core and @toon-protocol/sdk to npm via changesets.
# Auth comes from the org-level NPM_TOKEN secret (no local `npm login`).
# changesets rewrites `workspace:*` -> the real version at publish time.
#
# The Release PR is opened with the org GitHub App token (APP_ID/APP_PRIVATE_KEY),
# NOT the default GITHUB_TOKEN: the org forbids GitHub Actions from creating PRs
# ("GitHub Actions is not permitted to create or approve pull requests"), and that
# policy can't be overridden per-repo. An App is a distinct actor, so its PRs are
# exempt. If the App isn't installed the token step is skipped and we fall back to
# GITHUB_TOKEN (publish still works; only the Release-PR step would be blocked).
#
# The Release PR's commits are also authored by the App bot (setupGitUser: false +
# an explicit git identity below), NOT github-actions[bot]. Reason: the required
# `build` check on the Release PR is a `pull_request` workflow, and runs attributed
# to github-actions[bot] are gated by the org approval policy as `action_required`
# (they never turn green, so the Release PR stays BLOCKED forever). Attributing the
# commits to the App — a trusted installed integration — lets its CI run without the
# manual-approval gate. Fall back to github-actions[bot] only if the App is absent.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        continue-on-error: true # App not installed -> fall back to GITHUB_TOKEN
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve App bot git identity
        id: app-user
        if: steps.app-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for changeset commits
        run: |
          git config user.name "${{ steps.app-user.outputs.name || 'github-actions[bot]' }}"
          git config user.email "${{ steps.app-user.outputs.email || 'github-actions[bot]@users.noreply.github.com' }}"

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm -r build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          setupGitUser: false # use the App bot identity configured above, not github-actions[bot]
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
