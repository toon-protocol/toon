name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.9

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint

      - run: pnpm -r build

      - run: pnpm -r test --if-present

      - name: connector-contract-canary
        run: |
          pnpm --filter @toon-protocol/sdk test:integration tests/integration/connector-contract.test.ts tests/integration/connector-contract.multichain.test.ts
          pnpm --filter @toon-protocol/sdk exec tsc -p tests/integration/tsconfig.json

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --no-frozen-lockfile && pnpm build"
