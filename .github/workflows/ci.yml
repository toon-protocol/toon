name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint
        continue-on-error: true

      - run: pnpm -r build

      - run: pnpm -r test --if-present

  devbox-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.12
        with:
          enable-cache: 'true'

      - run: devbox run -- node --version

      - run: devbox run -- pnpm --version

      - run: devbox run -- pnpm install --no-frozen-lockfile

      - run: devbox run -- pnpm -r build
